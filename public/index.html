<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>OpenClaw Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: var(--tg-theme-bg-color, #0f1115);
      --text: var(--tg-theme-text-color, #f5f5f5);
      --hint: var(--tg-theme-hint-color, #8a8f98);
      --link: var(--tg-theme-link-color, #6ab2ff);
      --button: var(--tg-theme-button-color, #2ea6ff);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #171a21);
      --section-bg: var(--tg-theme-section-bg-color, #171a21);
      --accent: var(--tg-theme-accent-text-color, #7cc4ff);
      --destructive: var(--tg-theme-destructive-text-color, #ff5d5d);
      --ok: #32d074;
      --warn: #ffcc4d;
      --danger: #ff5d5d;
      --border: color-mix(in srgb, var(--hint) 28%, transparent);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .header, .card {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--button), var(--accent));
      display: grid;
      place-items: center;
      color: var(--button-text);
      font-weight: 700;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 18px;
      font-weight: 700;
    }

    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .muted {
      color: var(--hint);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--secondary-bg);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--danger); }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--secondary-bg);
      border-radius: 14px;
      padding: 10px;
      border: 1px solid var(--border);
    }

    .metric-label {
      color: var(--hint);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .progress-block { margin-bottom: 10px; }
    .progress-block:last-child { margin-bottom: 0; }

    .progress-label-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--hint);
    }

    .bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--secondary-bg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--button), var(--accent));
      border-radius: inherit;
    }

    .markdown, .activity-list {
      display: grid;
      gap: 8px;
      max-height: 300px;
      overflow: auto;
    }

    .markdown .line,
    .activity-item {
      background: var(--secondary-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .markdown .h1, .markdown .h2, .markdown .h3 {
      font-weight: 700;
      color: var(--accent);
    }

    .markdown .bullet {
      padding-left: 14px;
      position: relative;
    }

    .markdown .bullet::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .activity-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .role {
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
      font-weight: 700;
    }

    .error {
      color: var(--destructive);
      font-size: 12px;
      margin-top: 8px;
    }

    .footer {
      text-align: center;
      color: var(--hint);
      font-size: 12px;
      padding-bottom: 8px;
    }

    a { color: var(--link); }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div class="title-row">
        <div id="avatar" class="avatar">OC</div>
        <div>
          <h1>OpenClaw Dashboard</h1>
          <p id="subtitle" class="muted">Loading…</p>
        </div>
      </div>
      <div id="statusPill" class="status-pill">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Checking</span>
      </div>
    </section>

    <section class="card">
      <h2>Agent Status</h2>
      <div class="meta-grid">
        <div class="metric">
          <div class="metric-label">Version</div>
          <div id="versionValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Model</div>
          <div id="modelValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Gateway Uptime</div>
          <div id="uptimeValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Active Sessions</div>
          <div id="sessionsValue" class="metric-value">—</div>
        </div>
      </div>
      <div id="statusError" class="error"></div>
    </section>

    <section class="card">
      <h2>System</h2>
      <div class="progress-block">
        <div class="progress-label-row">
          <span>CPU</span>
          <span id="cpuLabel">—</span>
        </div>
        <div class="bar"><span id="cpuBar"></span></div>
      </div>
      <div class="progress-block">
        <div class="progress-label-row">
          <span>RAM</span>
          <span id="ramLabel">—</span>
        </div>
        <div class="bar"><span id="ramBar"></span></div>
      </div>
      <div class="progress-block">
        <div class="progress-label-row">
          <span>Disk</span>
          <span id="diskLabel">—</span>
        </div>
        <div class="bar"><span id="diskBar"></span></div>
      </div>
      <div class="meta-grid" style="margin-top: 10px;">
        <div class="metric">
          <div class="metric-label">Host</div>
          <div id="hostValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Platform</div>
          <div id="platformValue" class="metric-value">—</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Current Context</h2>
      <div id="contextCard" class="markdown">
        <div class="line muted">Loading NOW.md…</div>
      </div>
    </section>

    <section class="card">
      <h2>Recent Activity</h2>
      <div id="activityList" class="activity-list">
        <div class="activity-item muted">Loading recent activity…</div>
      </div>
      <div id="activityError" class="error"></div>
    </section>

    <div id="footer" class="footer">Waiting for data…</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const state = {
      lastGeneratedAt: null,
    };

    const el = (id) => document.getElementById(id);

    function setBar(id, value) {
      const safe = Math.max(0, Math.min(Number(value) || 0, 100));
      el(id).style.width = safe + '%';
    }

    function text(id, value) {
      el(id).textContent = value == null || value === '' ? '—' : String(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMarkdown(source) {
      const container = el('contextCard');
      const lines = String(source || '').split(/\r?\n/).filter((line, index, arr) => line.trim() || (index < arr.length - 1 && arr[index + 1].trim()));
      if (!lines.length) {
        container.innerHTML = '<div class="line muted">NOW.md is empty.</div>';
        return;
      }

      container.innerHTML = lines.map((line) => {
        const safe = escapeHtml(line);
        if (/^###\s+/.test(line)) {
          return '<div class="line h3">' + safe.replace(/^###\s+/, '') + '</div>';
        }
        if (/^##\s+/.test(line)) {
          return '<div class="line h2">' + safe.replace(/^##\s+/, '') + '</div>';
        }
        if (/^#\s+/.test(line)) {
          return '<div class="line h1">' + safe.replace(/^#\s+/, '') + '</div>';
        }
        if (/^[-*]\s+/.test(line)) {
          return '<div class="line bullet">' + safe.replace(/^[-*]\s+/, '') + '</div>';
        }
        const bolded = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        return '<div class="line">' + bolded + '</div>';
      }).join('');
    }

    function renderActivity(messages) {
      const container = el('activityList');
      if (!Array.isArray(messages) || messages.length === 0) {
        container.innerHTML = '<div class="activity-item muted">No recent activity found.</div>';
        return;
      }

      container.innerHTML = messages.map((message) => {
        const date = message.timestamp ? new Date(message.timestamp) : null;
        const time = date && !Number.isNaN(date.getTime())
          ? date.toLocaleString([], { hour: 'numeric', minute: '2-digit', month: 'short', day: 'numeric' })
          : 'Unknown time';
        return `
          <div class="activity-item">
            <div class="activity-top">
              <span class="role">${escapeHtml(message.role || 'unknown')}</span>
              <span class="muted">${escapeHtml(time)}</span>
            </div>
            <div>${escapeHtml(message.preview || '')}</div>
          </div>
        `;
      }).join('');
    }

    function applyHeader(status, user) {
      const name = user && (user.first_name || user.username) ? (user.first_name || user.username) : 'You';
      const initials = name.trim().slice(0, 2).toUpperCase();
      text('subtitle', `Signed in as ${name}`);
      text('avatar', initials || 'OC');

      const online = Boolean(status && status.online);
      el('statusDot').className = 'dot ' + (online ? 'ok' : 'err');
      text('statusText', online ? 'Online' : 'Offline');
      text('versionValue', status && status.version);
      text('modelValue', status && status.model);
      text('uptimeValue', status && status.uptime);
      text('sessionsValue', status && status.activeSessions);
      text('statusError', status && status.error ? status.error : '');
    }

    function applySystem(system) {
      text('cpuLabel', `${Math.round(system.cpu.usagePercent || 0)}% · ${system.cpu.cores || 0} cores`);
      text('ramLabel', `${system.memory.used || '—'} / ${system.memory.total || '—'} (${system.memory.usedPercent || 0}%)`);
      text('diskLabel', `${system.disk.used || '—'} / ${system.disk.total || '—'} (${system.disk.usedPercent || 0}%)`);
      text('hostValue', system.hostname);
      text('platformValue', system.platform);
      setBar('cpuBar', system.cpu.usagePercent || 0);
      setBar('ramBar', system.memory.usedPercent || 0);
      setBar('diskBar', system.disk.usedPercent || 0);
    }

    function updateFooter(generatedAt) {
      state.lastGeneratedAt = generatedAt || null;
      const date = generatedAt ? new Date(generatedAt) : null;
      if (!date || Number.isNaN(date.getTime())) {
        text('footer', 'No data yet');
        return;
      }

      const ageSeconds = Math.floor((Date.now() - date.getTime()) / 1000);
      const stale = ageSeconds > 60 ? ' · stale' : '';
      text('footer', `Updated ${date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })} · refreshes every 30s${stale}`);
    }

    async function loadDashboard() {
      const initData = tg && tg.initData ? tg.initData : '';
      if (!initData) {
        text('subtitle', 'Open this inside Telegram');
        text('statusText', 'No initData');
        el('statusDot').className = 'dot err';
        text('footer', 'Telegram authentication data missing');
        return;
      }

      try {
        const response = await fetch('/api/dashboard', {
          headers: {
            'X-Telegram-Init-Data': initData,
          },
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Request failed');
        }

        applyHeader(payload.status, tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null);
        applySystem(payload.system);
        renderMarkdown(payload.context && payload.context.nowMd);
        renderActivity(payload.activity && payload.activity.messages);
        text('activityError', payload.activity && payload.activity.error ? payload.activity.error : '');
        updateFooter(payload.generatedAt);
      } catch (error) {
        el('statusDot').className = 'dot err';
        text('statusText', 'Error');
        text('statusError', error.message || String(error));
        text('footer', 'Dashboard load failed');
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
    setInterval(() => updateFooter(state.lastGeneratedAt), 5000);
  </script>
</body>
</html>
