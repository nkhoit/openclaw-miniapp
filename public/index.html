<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>OpenClaw Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: var(--tg-theme-bg-color, #0f1115);
      --text: var(--tg-theme-text-color, #f5f5f5);
      --hint: var(--tg-theme-hint-color, #8a8f98);
      --link: var(--tg-theme-link-color, #6ab2ff);
      --button: var(--tg-theme-button-color, #2ea6ff);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #171a21);
      --section-bg: var(--tg-theme-section-bg-color, #171a21);
      --accent: var(--tg-theme-accent-text-color, #7cc4ff);
      --destructive: var(--tg-theme-destructive-text-color, #ff5d5d);
      --ok: #32d074;
      --warn: #ffcc4d;
      --danger: #ff5d5d;
      --border: color-mix(in srgb, var(--hint) 28%, transparent);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .header, .card {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      min-width: 0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .title-row > div {
      min-width: 0;
      overflow: hidden;
    }

    .avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--button), var(--accent));
      display: grid;
      place-items: center;
      color: var(--button-text);
      font-weight: 700;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(15px, 4vw, 18px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .muted {
      color: var(--hint);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 10px;
      background: var(--secondary-bg);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--danger); }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    @media (max-width: 320px) {
      .meta-grid {
        grid-template-columns: 1fr;
      }
    }

    .metric {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      min-width: 0;
      overflow: hidden;
    }

    .metric-label {
      color: var(--hint);
      font-size: 11px;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .metric-value {
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .progress-block { margin-bottom: 10px; }
    .progress-block:last-child { margin-bottom: 0; }

    .progress-label-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--hint);
      flex-wrap: wrap;
    }

    .progress-label-row span:last-child {
      text-align: right;
      flex-shrink: 0;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-row {
      margin-top: 10px;
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--hint);
      flex-wrap: wrap;
    }

    .stat-header span:first-child {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-header span:last-child {
      flex-shrink: 0;
      text-align: right;
    }

    .bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--secondary-bg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--button), var(--accent));
      border-radius: inherit;
    }

    .markdown {
      max-height: 300px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .markdown h1, .markdown h2, .markdown h3 {
      font-weight: 700;
      color: var(--accent);
      margin: 8px 0 4px;
    }
    .markdown h1 { font-size: 16px; }
    .markdown h2 { font-size: 14px; }
    .markdown h3 { font-size: 13px; }
    .markdown p { margin: 4px 0; }
    .markdown ul, .markdown ol { padding-left: 18px; margin: 4px 0; }
    .markdown li { margin: 2px 0; }
    .markdown code {
      background: var(--secondary-bg);
      border-radius: 4px;
      padding: 1px 4px;
      font-size: 12px;
    }
    .markdown pre {
      background: var(--secondary-bg);
      border-radius: 8px;
      padding: 8px;
      overflow-x: auto;
      font-size: 12px;
    }
    .markdown strong { color: var(--accent); }
    .markdown a { color: var(--accent); text-decoration: underline; }
    .markdown .checkbox { list-style: none; margin-left: -18px; }
    .markdown .checkbox.done { opacity: 0.5; text-decoration: line-through; }

    .activity-list {
      display: grid;
      gap: 7px;
      max-height: 320px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .activity-item {
      background: var(--secondary-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 10px;
      min-width: 0;
      overflow: hidden;
    }

    .activity-item > div:last-child {
      font-size: 12px;
      overflow-wrap: anywhere;
      word-break: break-word;
      color: var(--hint);
    }

    .markdown .h1, .markdown .h2, .markdown .h3 {
      font-weight: 700;
      color: var(--accent);
    }

    .markdown .bullet {
      padding-left: 14px;
      position: relative;
    }

    .markdown .bullet::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .activity-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      flex-wrap: wrap;
    }

    .role {
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
      font-weight: 700;
      overflow-wrap: anywhere;
      word-break: break-all;
      min-width: 0;
      flex: 1;
    }

    .error {
      color: var(--destructive);
      font-size: 12px;
      margin-top: 8px;
    }
    .error:empty {
      display: none;
    }

    .footer {
      text-align: center;
      color: var(--hint);
      font-size: 12px;
      padding-bottom: 8px;
    }

    a { color: var(--link); }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div class="title-row">
        <div id="avatar" class="avatar">OC</div>
        <div>
          <h1 id="dashTitle">OpenClaw Dashboard</h1>
          <p id="subtitle" class="muted">Loading…</p>
        </div>
      </div>
      <div id="statusPill" class="status-pill">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Checking</span>
      </div>
    </section>

    <section class="card">
      <h2>Agent Status</h2>
      <div class="meta-grid">
        <div class="metric">
          <div class="metric-label">Version</div>
          <div id="versionValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Model</div>
          <div id="modelValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Gateway Uptime</div>
          <div id="uptimeValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Active Sessions</div>
          <div id="sessionsValue" class="metric-value">—</div>
        </div>
      </div>
      <div id="statusError" class="error"></div>
    </section>

    <section class="card">
      <h2>System</h2>
      <div class="progress-block">
        <div class="progress-label-row">
          <span>CPU</span>
          <span id="cpuLabel">—</span>
        </div>
        <div class="bar"><span id="cpuBar"></span></div>
      </div>
      <div class="progress-block">
        <div class="progress-label-row">
          <span>RAM</span>
          <span id="ramLabel">—</span>
        </div>
        <div class="bar"><span id="ramBar"></span></div>
      </div>
      <div class="progress-block">
        <div class="progress-label-row">
          <span>Disk</span>
          <span id="diskLabel">—</span>
        </div>
        <div class="bar"><span id="diskBar"></span></div>
      </div>
      <div id="gpuSection" style="display: none;">
        <div id="gpuCards"></div>
      </div>
      <div class="meta-grid" style="margin-top: 10px;">
        <div class="metric">
          <div class="metric-label">Host</div>
          <div id="hostValue" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Platform</div>
          <div id="platformValue" class="metric-value">—</div>
        </div>
      </div>
    </section>

    <div id="cardsContainer"></div>

    <section id="cronSection" class="card" style="display:none">
      <h2>Up Next <span style="font-size:11px;font-weight:400;color:var(--hint)">(next 5 cron jobs)</span></h2>
      <div id="cronList" class="activity-list"></div>
    </section>

    <section class="card">
      <h2>Recent Activity</h2>
      <div id="activityList" class="activity-list">
        <div class="activity-item muted">Loading recent activity…</div>
      </div>
      <div id="activityError" class="error"></div>
    </section>

    <div id="footer" class="footer">Waiting for data…</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const state = {
      lastGeneratedAt: null,
    };

    const el = (id) => document.getElementById(id);

    function setBar(id, value) {
      const safe = Math.max(0, Math.min(Number(value) || 0, 100));
      el(id).style.width = safe + '%';
    }

    function text(id, value, raw) {
      el(id).textContent = raw ? String(value ?? '') : (value == null || value === '' ? '—' : String(value));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

            function renderMarkdown(source, container) {
      if (!container) return;
      if (!source) { container.innerHTML = ''; return; }
      const raw = String(source).trim();
      if (!raw) { container.innerHTML = '<div class="muted">Empty.</div>'; return; }

      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const inline = s => esc(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>');

      let html = '', inList = false;
      for (const line of raw.split('\n')) {
        const trimmed = line.trimEnd();
        // Headers
        const hMatch = trimmed.match(/^(#{1,3})\s+(.+)/);
        if (hMatch) {
          if (inList) { html += '</ul>'; inList = false; }
          const level = hMatch[1].length;
          html += `<h${level}>${inline(hMatch[2])}</h${level}>`;
          continue;
        }
        // Checkbox items
        const cbMatch = trimmed.match(/^[-*]\s+\[([ xX])\]\s+(.*)/);
        if (cbMatch) {
          if (!inList) { html += '<ul>'; inList = true; }
          const checked = cbMatch[1] !== ' ';
          html += `<li class="checkbox ${checked ? 'done' : ''}">${checked ? '☑' : '☐'} ${inline(cbMatch[2])}</li>`;
          continue;
        }
        // List items
        const liMatch = trimmed.match(/^[-*]\s+(.*)/);
        if (liMatch) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${inline(liMatch[1])}</li>`;
          continue;
        }
        // Blank line
        if (!trimmed) {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }
        // Paragraph
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p>${inline(trimmed)}</p>`;
      }
      if (inList) html += '</ul>';
      container.innerHTML = html;
    }

    function renderCards(cards) {
      const container = el('cardsContainer');
      if (!Array.isArray(cards) || cards.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = cards.map((card, i) => 
        `<section class="card"><h2>${esc(card.name)}</h2><div class="markdown" id="card-md-${i}"></div></section>`
      ).join('');
      cards.forEach((card, i) => {
        renderMarkdown(card.content, document.getElementById(`card-md-${i}`));
      });
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderActivity(messages) {
      const container = el('activityList');
      if (!Array.isArray(messages) || messages.length === 0) {
        container.innerHTML = '<div class="activity-item muted">No recent activity found.</div>';
        return;
      }

      container.innerHTML = messages.map((message) => {
        const date = message.timestamp ? new Date(message.timestamp) : null;
        const time = date && !Number.isNaN(date.getTime())
          ? date.toLocaleString([], { hour: 'numeric', minute: '2-digit', month: 'short', day: 'numeric' })
          : 'Unknown time';
        return `
          <div class="activity-item">
            <div class="activity-top">
              <span class="role">${escapeHtml(message.role || 'unknown')}</span>
              <span class="muted">${escapeHtml(time)}</span>
            </div>
            <div>${escapeHtml(message.preview || '')}</div>
          </div>
        `;
      }).join('');
    }

    function applyHeader(status, user) {
      const identity = status && status.identity;
      const agentName = identity && identity.name ? identity.name : 'OpenClaw';
      const agentEmoji = identity && identity.emoji ? identity.emoji : null;
      const userName = user && (user.first_name || user.username) ? (user.first_name || user.username) : 'You';

      el('dashTitle').textContent = agentName + ' Dashboard';
      text('subtitle', `Signed in as ${userName}`);
      text('avatar', agentEmoji || agentName.slice(0, 2).toUpperCase());

      const online = Boolean(status && status.online);
      el('statusDot').className = 'dot ' + (online ? 'ok' : 'err');
      text('statusText', online ? 'Online' : 'Offline');
      text('versionValue', status && status.version);
      text('modelValue', status && status.model);
      text('uptimeValue', status && status.uptime);
      text('sessionsValue', status && status.activeSessions);
      text('statusError', status && status.error ? status.error : '', true);
    }

    function applySystem(system) {
      text('cpuLabel', `${Math.round(system.cpu.usagePercent || 0)}% · ${system.cpu.cores || 0} cores`);
      text('ramLabel', `${system.memory.used || '—'} / ${system.memory.total || '—'} (${system.memory.usedPercent || 0}%)`);
      text('diskLabel', `${system.disk.used || '—'} / ${system.disk.total || '—'} (${system.disk.usedPercent || 0}%)`);
      text('hostValue', system.hostname);
      text('platformValue', system.platform);
      setBar('cpuBar', system.cpu.usagePercent || 0);
      setBar('ramBar', system.memory.usedPercent || 0);
      setBar('diskBar', system.disk.usedPercent || 0);

      // GPU (conditional)
      const gpuSection = el('gpuSection');
      const gpuCards = el('gpuCards');
      if (system.gpu && system.gpu.available && system.gpu.gpus) {
        gpuSection.style.display = '';
        gpuCards.innerHTML = system.gpu.gpus.map((g, i) => `
          <div class="stat-row" style="margin-top: 8px;">
            <div class="stat-header">
              <span>GPU${system.gpu.gpus.length > 1 ? ' ' + i : ''} — ${g.name}</span>
              <span>${g.memUsedFormatted} / ${g.memTotalFormatted} (${g.memPercent}%)</span>
            </div>
            <div class="bar"><span style="width: ${g.memPercent || 0}%;"></span></div>
            <div style="display: flex; gap: 16px; margin-top: 4px; font-size: 11px; color: var(--hint);">
              <span>Util: ${g.utilization}%</span>
              <span>Temp: ${g.tempC}°C</span>
            </div>
          </div>
        `).join('');
      } else {
        gpuSection.style.display = 'none';
      }
    }

    function renderCron(cron) {
      const section = el('cronSection');
      const container = el('cronList');
      if (!cron || !Array.isArray(cron.jobs) || cron.jobs.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = '';
      container.innerHTML = cron.jobs.map(j => {
        const next = j.nextRunAtMs ? timeSince2(j.nextRunAtMs) : '—';
        const statusColor = j.enabled ? 'var(--ok)' : 'var(--hint)';
        const statusLabel = j.enabled ? (j.lastStatus === 'error' ? '⚠️' : '●') : '○';
        return `
          <div class="activity-item">
            <div class="activity-top">
              <span class="role" style="color: ${statusColor}">${statusLabel} ${escapeHtml(j.name)}</span>
              <span class="muted" style="flex-shrink:0">${j.enabled ? 'active' : 'disabled'}</span>
            </div>
            <div>${escapeHtml(j.scheduleLabel || j.scheduleKind || '—')} · next: ${escapeHtml(next)}</div>
          </div>
        `;
      }).join('');
    }

    function timeSince2(ts) {
      const diff = ts - Date.now();
      if (diff <= 0) return 'now';
      const secs = Math.floor(diff / 1000);
      if (secs < 60) return `in ${secs}s`;
      if (secs < 3600) return `in ${Math.floor(secs / 60)}m`;
      if (secs < 86400) return `in ${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m`;
      return `in ${Math.floor(secs / 86400)}d`;
    }

    function updateFooter(generatedAt) {
      state.lastGeneratedAt = generatedAt || null;
      const date = generatedAt ? new Date(generatedAt) : null;
      if (!date || Number.isNaN(date.getTime())) {
        text('footer', 'No data yet');
        return;
      }

      const ageSeconds = Math.floor((Date.now() - date.getTime()) / 1000);
      const stale = ageSeconds > 60 ? ' · stale' : '';
      text('footer', `Updated ${date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })} · refreshes every 30s${stale}`);
    }

    async function loadDashboard() {
      const initData = tg && tg.initData ? tg.initData : '';
      if (!initData) {
        text('subtitle', 'Open this inside Telegram');
        text('statusText', 'No initData');
        el('statusDot').className = 'dot err';
        text('footer', 'Telegram authentication data missing');
        return;
      }

      try {
        const response = await fetch('api/dashboard', {
          headers: {
            'X-Telegram-Init-Data': initData,
          },
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Request failed');
        }

        applyHeader(payload.status, tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null);
        applySystem(payload.system);
        renderCards(payload.cards || []);
        renderActivity(payload.activity && payload.activity.messages);
        text('activityError', payload.activity && payload.activity.error ? payload.activity.error : '', true);
        renderCron(payload.cron);
        updateFooter(payload.generatedAt);
      } catch (error) {
        el('statusDot').className = 'dot err';
        text('statusText', 'Error');
        text('statusError', error.message || String(error));
        text('footer', 'Dashboard load failed');
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
    setInterval(() => updateFooter(state.lastGeneratedAt), 5000);
  </script>
</body>
</html>
